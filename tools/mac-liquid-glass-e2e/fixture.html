<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Buddy Liquid Glass E2E</title>
  </head>
  <body style="margin: 0; min-height: 100vh; background: transparent">
    <input
      id="target"
      aria-label="Native hierarchy input target"
      autofocus
      style="position: absolute; top: 20px; left: 20px; width: 200px; height: 40px"
    />
    <div
      id="scroll-target"
      aria-label="Native hierarchy scroll target"
      tabindex="0"
      style="
        position: absolute;
        top: 20px;
        left: 260px;
        width: 130px;
        height: 160px;
        overflow-y: auto;
      "
    >
      <div style="height: 800px">scroll through native glass</div>
    </div>
    <script src="fixture.js"></script>
  </body>
</html>
