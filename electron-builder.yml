# electron-builder config — native Windows and macOS artifacts.
appId: ai.fastyr.buddy
productName: Buddy
afterPack: build/after-pack.mjs
afterSign: build/after-sign.mjs
directories:
  output: dist
files:
  - out/**
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/uiohook-napi/**'
win:
  fileAssociations:
    - ext:
        - md
        - markdown
        - mdown
        - mkd
        - mkdn
      name: Buddy.Markdown
      description: Markdown document
  target:
    - portable
    - nsis
  # buddy icon — regenerate with `npm run icon` (build/make-icon.mjs)
  icon: build/icon.ico
  # Executable editing must stay ON so the icon/version resources get stamped
  # into Buddy.exe; the build remains unsigned (no certificate configured).
  signAndEditExecutable: true
  # The disposable PowerShell phone-audio QA bridge is Windows-only. Keeping
  # it out of macOS artifacts makes the platform boundary structural as well
  # as runtime-enforced.
  extraResources:
    - from: tools/phone-audio-bridge
      to: phone-audio-bridge
      filter:
        - start.mjs
        - setup-cert.ps1
        - phone.html
        - phone.js
        - styles.css
        - capture-worklet.js
    - from: node_modules/ws
      to: phone-audio-bridge/node_modules/ws
mac:
  fileAssociations:
    - ext:
        - md
        - markdown
        - mdown
        - mkd
        - mkdn
      name: Markdown document
      role: Viewer
      rank: Alternate
  target:
    - dmg
    - zip
  # Preserve electron-builder's exact resolved certificate fingerprint. Its
  # default signer drops the hash and becomes ambiguous when names collide.
  sign: build/mac-sign.mjs
  icon: build/icon.icns
  category: public.app-category.utilities
  minimumSystemVersion: '12.0'
  # Direct distribution uses the hardened runtime. electron-builder only
  # submits to Apple's notary service when a complete supported credential
  # set is present; `npm run dist:release:mac` enforces that precondition.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
  artifactName: '${productName}-${version}-${arch}.${ext}'
  extendInfo:
    LSUIElement: true
    NSMicrophoneUsageDescription: Buddy uses the microphone only while you explicitly talk to it.
    NSScreenCaptureUsageDescription: Buddy captures your screens only when you press the hotkey or submit a typed request.
  extraResources:
    - from: build/native/buddy-macos-native.node
      to: buddy-macos-native.node
    - from: build/trayTemplate.png
      to: trayTemplate.png
    - from: build/trayTemplate@2x.png
      to: trayTemplate@2x.png
dmg:
  sign: false
nsis:
  oneClick: true
  # electron-builder's Windows file-association support requires a
  # per-machine NSIS install so Explorer can register Buddy reliably.
  perMachine: true
  deleteAppDataOnUninstall: false
electronLanguages:
  - en-US
npmRebuild: false
