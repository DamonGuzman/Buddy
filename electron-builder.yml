# electron-builder config — Windows portable + NSIS, unsigned (MVP).
appId: ai.fastyr.clicky
productName: Clicky
directories:
  output: dist
files:
  - out/**
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/uiohook-napi/**'
win:
  target:
    - portable
    - nsis
  # unsigned for MVP
  signAndEditExecutable: false
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
electronLanguages:
  - en-US
npmRebuild: false
