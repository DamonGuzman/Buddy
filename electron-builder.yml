# electron-builder config — Windows portable + NSIS, unsigned (MVP).
appId: ai.fastyr.clicky
productName: Clicky
directories:
  output: dist
files:
  - out/**
  - package.json
  - '!**/*.map'
asarUnpack:
  - '**/node_modules/uiohook-napi/**'
win:
  target:
    - portable
    - nsis
  # buddy icon — regenerate with `npm run icon` (build/make-icon.mjs)
  icon: build/icon.ico
  # Executable editing must stay ON so the icon/version resources get stamped
  # into Clicky.exe; the build remains unsigned (no certificate configured).
  signAndEditExecutable: true
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
electronLanguages:
  - en-US
npmRebuild: false
