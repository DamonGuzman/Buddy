<!doctype html>
<!-- M8.5 pointing-eval scene: labeled signup form. See app-toolbar.html for
     the ground-truth reporting contract. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Northwind — create your account</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
      }
      body {
        background: #f7f5f0;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2ddd2;
        border-radius: 14px;
        padding: 56px 64px;
        width: 640px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 32px;
        color: #1f2937;
        margin-bottom: 10px;
      }
      p.sub {
        color: #6b7280;
        font-size: 19px;
        margin-bottom: 36px;
      }
      label {
        display: block;
        font-size: 19px;
        color: #374151;
        margin: 22px 0 8px;
        font-weight: 600;
      }
      input[type='email'],
      input[type='password'] {
        width: 100%;
        font-size: 21px;
        padding: 16px 18px;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        background: #fbfaf7;
      }
      #field-email {
        border-color: #60a5fa;
      }
      #field-password {
        border-color: #a78bfa;
      }
      .check {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 30px 0;
        font-size: 19px;
        color: #374151;
      }
      .check input {
        width: 26px;
        height: 26px;
        accent-color: #059669;
      }
      #btn-submit {
        width: 100%;
        margin-top: 8px;
        font-size: 23px;
        font-weight: 600;
        padding: 18px;
        border: none;
        border-radius: 10px;
        background: #ea580c;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Create your account</h1>
      <p class="sub">Join 40,000 teams already planning with Northwind.</p>
      <label for="field-email">Email address</label>
      <input
        type="email"
        id="field-email"
        data-target="email"
        data-desc="the email address field"
        placeholder="you@company.com"
      />
      <label for="field-password">Password</label>
      <input
        type="password"
        id="field-password"
        data-target="password"
        data-desc="the password field"
        placeholder="at least 12 characters"
      />
      <div class="check">
        <input
          type="checkbox"
          id="check-subscribe"
          data-target="subscribe"
          data-desc="the subscribe to newsletter checkbox"
        />
        <label for="check-subscribe" style="margin: 0; font-weight: 400"
          >Send me the monthly product newsletter</label
        >
      </div>
      <button id="btn-submit" data-target="submit" data-desc="the create account button">
        Create account
      </button>
    </div>
    <script>
      const SCENE = 'form';
      const q = new URLSearchParams(location.search);
      const token = q.get('token') || '';
      const port = q.get('port') || '8199';
      function report() {
        const chromeY = window.outerHeight - window.innerHeight;
        const chromeX = Math.round((window.outerWidth - window.innerWidth) / 2);
        const targets = [...document.querySelectorAll('[data-target]')].map((el) => {
          const r = el.getBoundingClientRect();
          return {
            name: el.dataset.target,
            desc: el.dataset.desc || el.dataset.target,
            rect: {
              x: Math.round(window.screenX + chromeX + r.left),
              y: Math.round(window.screenY + chromeY + r.top),
              width: Math.round(r.width),
              height: Math.round(r.height),
            },
          };
        });
        fetch(
          'http://127.0.0.1:' + port + '/eval/ground-truth?token=' + encodeURIComponent(token),
          {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
              scene: SCENE,
              dpr: window.devicePixelRatio,
              window: { screenX, screenY, innerWidth, innerHeight, outerWidth, outerHeight },
              targets,
            }),
          },
        ).catch(() => {});
      }
      window.addEventListener('load', () => {
        setTimeout(report, 400);
        setTimeout(report, 1500);
      });
    </script>
  </body>
</html>
