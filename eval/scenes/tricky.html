<!doctype html>
<!-- M8.5 pointing-eval scene: deliberately hard targets — two near-identical
     buttons ("Save" vs "Save As"), a tiny 24px icon, and a control hugging
     the screen edge. See app-toolbar.html for the ground-truth contract. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ledgerly — export options</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
      }
      body {
        background: #f3f4f6;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }
      .bar {
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
        padding: 18px 32px;
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .bar h1 {
        font-size: 24px;
        color: #111827;
        margin-right: auto;
      }
      #bell {
        width: 24px;
        height: 24px;
        font-size: 18px;
        line-height: 24px;
        text-align: center;
        background: #fde68a;
        border-radius: 6px;
        cursor: pointer;
      }
      .panel {
        width: 720px;
        margin: 90px auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 44px 52px;
      }
      .panel p {
        font-size: 20px;
        color: #4b5563;
        margin-bottom: 34px;
      }
      .row {
        display: flex;
        gap: 20px;
      }
      .btn {
        font-size: 21px;
        padding: 15px 34px;
        border-radius: 9px;
        border: 1px solid #94a3b8;
        background: #e2e8f0;
        color: #1e293b;
        cursor: pointer;
      }
      .btn.primary {
        background: #334155;
        color: #fff;
      }
      #corner-help {
        position: absolute;
        right: 8px;
        bottom: 8px;
        font-size: 18px;
        padding: 10px 18px;
        border-radius: 8px;
        border: none;
        background: #0891b2;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>Export options</h1>
      <span id="bell" data-target="small-icon" data-desc="the small bell notification icon"
        >&#128276;</span
      >
    </div>
    <div class="panel">
      <p>
        Choose how to keep this report. "Save" overwrites the current file; "Save As" writes a copy
        under a new name.
      </p>
      <div class="row">
        <button
          class="btn primary"
          id="btn-save"
          data-target="save"
          data-desc="the save button (not save as)"
        >
          Save
        </button>
        <button class="btn" id="btn-save-as" data-target="save-as" data-desc="the save as button">
          Save As
        </button>
        <button class="btn" id="btn-cancel">Cancel</button>
      </div>
    </div>
    <button
      id="corner-help"
      data-target="edge-button"
      data-desc="the help button in the bottom right corner of the screen"
    >
      ? Help
    </button>
    <script>
      const SCENE = 'tricky';
      const q = new URLSearchParams(location.search);
      const token = q.get('token') || '';
      const port = q.get('port') || '8199';
      function report() {
        const chromeY = window.outerHeight - window.innerHeight;
        const chromeX = Math.round((window.outerWidth - window.innerWidth) / 2);
        const targets = [...document.querySelectorAll('[data-target]')].map((el) => {
          const r = el.getBoundingClientRect();
          return {
            name: el.dataset.target,
            desc: el.dataset.desc || el.dataset.target,
            rect: {
              x: Math.round(window.screenX + chromeX + r.left),
              y: Math.round(window.screenY + chromeY + r.top),
              width: Math.round(r.width),
              height: Math.round(r.height),
            },
          };
        });
        fetch(
          'http://127.0.0.1:' + port + '/eval/ground-truth?token=' + encodeURIComponent(token),
          {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
              scene: SCENE,
              dpr: window.devicePixelRatio,
              window: { screenX, screenY, innerWidth, innerHeight, outerWidth, outerHeight },
              targets,
            }),
          },
        ).catch(() => {});
      }
      window.addEventListener('load', () => {
        setTimeout(report, 400);
        setTimeout(report, 1500);
      });
    </script>
  </body>
</html>
