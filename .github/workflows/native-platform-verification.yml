name: Native platform verification

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/native-platform-verification

permissions:
  contents: read

jobs:
  windows:
    name: Windows UIA, build, and package
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Exercise real UIA across adjacent WPF windows
        run: npm run test:uia:win
        env:
          BUDDY_WINDOWS_UIA_E2E: '1'
      - run: npm run build
      - run: npm run dist
      - name: Launch packaged Windows app and inspect live overlay state
        shell: pwsh
        run: |
          $portable = Get-ChildItem dist -Filter '*.exe' |
            Where-Object { $_.Name -notmatch 'Setup' } |
            Select-Object -First 1
          if ($null -eq $portable) { throw 'portable Buddy executable was not produced' }
          $data = Join-Path $env:RUNNER_TEMP 'buddy-windows-package-qa'
          $env:CLICKY_DEBUG = '1'
          $env:CLICKY_DEBUG_TOKEN = 'buddy-windows-package'
          $env:CLICKY_DEBUG_PORT = '8320'
          $process = Start-Process -FilePath $portable.FullName -ArgumentList "--user-data-dir=`"$data`"" -PassThru
          try {
            $headers = @{ 'X-Debug-Token' = 'buddy-windows-package' }
            $state = $null
            for ($i = 0; $i -lt 40 -and $null -eq $state; $i++) {
              try { $state = Invoke-RestMethod -Headers $headers -Uri 'http://127.0.0.1:8320/state' }
              catch { Start-Sleep -Milliseconds 500 }
            }
            if ($null -eq $state) { throw 'packaged Buddy debug server did not start' }
            if ($state.appVersion -ne '0.1.0' -or $state.overlayWindowCount -lt 1) {
              throw "unexpected packaged state: $($state | ConvertTo-Json -Compress -Depth 5)"
            }
            $hover = Invoke-RestMethod -Headers $headers -Uri 'http://127.0.0.1:8320/hover/state'
            if ($hover.windows.Count -lt 1 -or $hover.windows[0].surface.kind -ne 'off') {
              throw "unexpected Windows overlay state: $($hover | ConvertTo-Json -Compress -Depth 6)"
            }
          } finally {
            if ($null -ne $process -and -not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }
      - uses: actions/upload-artifact@v7
        with:
          name: buddy-windows-unsigned
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error

  macos:
    name: macOS native bridge, build, and package
    runs-on: macos-26
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify native bridge API and Mach-O contract
        run: |
          bridge=build/native/buddy-macos-native.node
          test -f "$bridge"
          lipo "$bridge" -verify_arch arm64 x86_64

          BRIDGE="$bridge" node <<'NODE'
          const bridge = require(`./${process.env.BRIDGE}`);
          const requiredSubset = [
            'coverDisplayWithWindow',
            'getDisplaySurface',
            'preflightListenEventAccess',
            'queryAccessibility',
            'requestListenEventAccess',
            'requestScreenCaptureAccess',
          ];
          const currentExports = [
            ...requiredSubset,
            'inspectLiquidGlass',
            'inspectLiquidGlassRegions',
            'installLiquidGlass',
            'postInput',
            'prepareFocusedReceiverTypeText',
            'queryFocusedReceiver',
            'removeLiquidGlass',
            'setLiquidGlassRegions',
            'restoreFocusedReceiver',
            'supportsLiquidGlass',
            'updateLiquidGlass',
            'verifyFocusedReceiverTypeText',
          ].sort();
          const actualExports = Object.keys(bridge).sort();
          const missingRequired = requiredSubset.filter((name) => typeof bridge[name] !== 'function');
          if (missingRequired.length > 0) {
            throw new Error(`native bridge is missing required functions: ${missingRequired.join(', ')}`);
          }
          if (JSON.stringify(actualExports) !== JSON.stringify(currentExports)) {
            throw new Error(
              `native bridge export drift: expected ${currentExports.join(', ')}; ` +
                `received ${actualExports.join(', ')}`,
            );
          }
          NODE

          for arch in arm64 x86_64; do
            read -r minos sdk <<EOF
          $(otool -arch "$arch" -l "$bridge" | awk '
            $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build_version = 1; next }
            in_build_version && $1 == "minos" { minos = $2 }
            in_build_version && $1 == "sdk" { print minos, $2; exit }
          ')
          EOF
            test "$minos" = '12.0' || {
              echo "$arch bridge deployment target is $minos, expected 12.0" >&2
              exit 1
            }
            sdk_major=${sdk%%.*}
            test -n "$sdk_major" && test "$sdk_major" -ge 26 || {
              echo "$arch bridge SDK is $sdk, expected 26 or newer" >&2
              exit 1
            }
            nm -arch "$arch" -m "$bridge" |
              grep -Fq "(undefined) weak external _OBJC_CLASS_\$_NSGlassEffectView (from AppKit)" || {
                echo "$arch does not weak-link NSGlassEffectView" >&2
                exit 1
              }
          done
      - uses: actions/upload-artifact@v7
        with:
          name: buddy-macos-native-bridge
          path: build/native/buddy-macos-native.node
          if-no-files-found: error
      - name: Package disposable QA build
        run: npm run dist
        env:
          BUDDY_ALLOW_ADHOC: '1'
      - name: Verify and launch packaged macOS app
        run: |
          app_dir="$RUNNER_TEMP/buddy-macos-package-qa"
          data_dir="$RUNNER_TEMP/buddy-macos-package-data"
          mkdir -p "$app_dir" "$data_dir"
          zip_path=$(find dist -maxdepth 1 -name '*.zip' -print -quit)
          test -n "$zip_path"
          ditto -x -k "$zip_path" "$app_dir"
          app="$app_dir/Buddy.app"
          packaged_bridge="$app/Contents/Resources/buddy-macos-native.node"
          test -f "$packaged_bridge"
          lipo "$packaged_bridge" -verify_arch arm64 x86_64
          codesign --verify --strict --verbose=2 "$packaged_bridge"
          codesign --display --verbose=4 "$packaged_bridge" 2>&1 | grep -q 'runtime'
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --display --verbose=4 "$app" 2>&1 | grep -q 'runtime'
          codesign --display --entitlements :- "$app" 2>&1 |
            grep -q 'com.apple.security.cs.disable-library-validation'
          test "$(plutil -extract LSMinimumSystemVersion raw -o - "$app/Contents/Info.plist")" = '12.0'
          CLICKY_DEBUG=1 CLICKY_DEBUG_TOKEN=buddy-macos-package CLICKY_DEBUG_PORT=8321 \
            "$app/Contents/MacOS/Buddy" --user-data-dir="$data_dir" \
            >"$RUNNER_TEMP/buddy-macos-package.log" 2>&1 &
          buddy_pid=$!
          trap 'kill "$buddy_pid" 2>/dev/null || true' EXIT
          state=''
          for _ in $(seq 1 40); do
            state=$(curl -fsS -H 'X-Debug-Token: buddy-macos-package' \
              http://127.0.0.1:8321/hover/state 2>/dev/null) && break
            sleep 0.5
          done
          test -n "$state" || { cat "$RUNNER_TEMP/buddy-macos-package.log"; exit 1; }
          STATE="$state" node -e "const s=JSON.parse(process.env.STATE); if (!s.windows?.length || s.windows.some(w => w.nativeFullDisplay !== true || !['notch','floating'].includes(w.surface?.kind))) { console.error(JSON.stringify(s)); process.exit(1) }"
          kill "$buddy_pid"
          wait "$buddy_pid" 2>/dev/null || true
          trap - EXIT
          BUDDY_WHISPER_E2E_EXECUTABLE="$app/Contents/MacOS/Buddy" npm run test:whisper
      - uses: actions/upload-artifact@v7
        with:
          name: buddy-macos-adhoc
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error

  macos-liquid-glass-runtime:
    name: macOS 26 Liquid Glass runtime lifecycle
    needs: macos
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Exercise NSGlassEffectView through Electron
        run: |
          test "$(sw_vers -productVersion | cut -d. -f1)" = '26'
          npm run test:liquid-glass:mac

  macos-native-backward-runtime:
    name: macOS 14 weak-linked native bridge runtime
    needs: macos
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/download-artifact@v8
        with:
          name: buddy-macos-native-bridge
          path: ${{ runner.temp }}/buddy-macos-native-bridge
      - name: Load SDK 26 bridge without Liquid Glass
        env:
          BUDDY_NATIVE_BRIDGE: ${{ runner.temp }}/buddy-macos-native-bridge/buddy-macos-native.node
        run: |
          test "$(sw_vers -productVersion | cut -d. -f1)" = '14'
          node <<'NODE'
          const bridge = require(process.env.BUDDY_NATIVE_BRIDGE);
          if (typeof bridge.supportsLiquidGlass !== 'function') {
            throw new Error('downloaded native bridge is missing supportsLiquidGlass');
          }
          if (bridge.supportsLiquidGlass() !== false) {
            throw new Error('pre-macOS 26 runtime unexpectedly reported Liquid Glass support');
          }
          console.log('SDK 26 bridge loaded safely and reported Liquid Glass unavailable');
          NODE
