name: Native platform verification

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/native-platform-verification

permissions:
  contents: read

jobs:
  windows:
    name: Windows UIA, build, and package
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Exercise real UIA across adjacent WPF windows
        run: npm run test:uia:win
        env:
          BUDDY_WINDOWS_UIA_E2E: '1'
      - run: npm run build
      - run: npm run dist
      - name: Launch packaged Windows app and inspect live overlay state
        shell: pwsh
        run: |
          $portable = Get-ChildItem dist -Filter '*.exe' |
            Where-Object { $_.Name -notmatch 'Setup' } |
            Select-Object -First 1
          if ($null -eq $portable) { throw 'portable Buddy executable was not produced' }
          $data = Join-Path $env:RUNNER_TEMP 'buddy-windows-package-qa'
          $env:CLICKY_DEBUG = '1'
          $env:CLICKY_DEBUG_TOKEN = 'buddy-windows-package'
          $env:CLICKY_DEBUG_PORT = '8320'
          $process = Start-Process -FilePath $portable.FullName -ArgumentList "--user-data-dir=`"$data`"" -PassThru
          try {
            $headers = @{ 'X-Debug-Token' = 'buddy-windows-package' }
            $state = $null
            for ($i = 0; $i -lt 40 -and $null -eq $state; $i++) {
              try { $state = Invoke-RestMethod -Headers $headers -Uri 'http://127.0.0.1:8320/state' }
              catch { Start-Sleep -Milliseconds 500 }
            }
            if ($null -eq $state) { throw 'packaged Buddy debug server did not start' }
            if ($state.appVersion -ne '0.1.0' -or $state.overlayWindowCount -lt 1) {
              throw "unexpected packaged state: $($state | ConvertTo-Json -Compress -Depth 5)"
            }
            $hover = Invoke-RestMethod -Headers $headers -Uri 'http://127.0.0.1:8320/hover/state'
            if ($hover.windows.Count -lt 1 -or $hover.windows[0].surface.kind -ne 'off') {
              throw "unexpected Windows overlay state: $($hover | ConvertTo-Json -Compress -Depth 6)"
            }
          } finally {
            if ($null -ne $process -and -not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }
      - uses: actions/upload-artifact@v7
        with:
          name: buddy-windows-unsigned
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error

  macos:
    name: macOS native bridge, build, and package
    runs-on: macos-14
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify universal native bridge
        run: |
          lipo build/native/macos-screen-permission.node -verify_arch arm64 x86_64
          node -e "const bridge=require('./build/native/macos-screen-permission.node'); const expected=['coverDisplayWithWindow','getDisplaySurface','preflightListenEventAccess','queryAccessibility','requestListenEventAccess','requestScreenCaptureAccess']; if (JSON.stringify(Object.keys(bridge).sort()) !== JSON.stringify(expected)) process.exit(1)"
      - name: Package disposable QA build
        run: npm run dist
        env:
          BUDDY_ALLOW_ADHOC: '1'
      - name: Launch packaged macOS app and inspect native display placement
        run: |
          app_dir="$RUNNER_TEMP/buddy-macos-package-qa"
          data_dir="$RUNNER_TEMP/buddy-macos-package-data"
          mkdir -p "$app_dir" "$data_dir"
          zip_path=$(find dist -maxdepth 1 -name '*.zip' -print -quit)
          test -n "$zip_path"
          ditto -x -k "$zip_path" "$app_dir"
          codesign --verify --deep --strict --verbose=2 "$app_dir/Buddy.app"
          codesign --display --verbose=4 "$app_dir/Buddy.app" 2>&1 | grep -q 'runtime'
          codesign --display --entitlements :- "$app_dir/Buddy.app" 2>&1 |
            grep -q 'com.apple.security.cs.disable-library-validation'
          CLICKY_DEBUG=1 CLICKY_DEBUG_TOKEN=buddy-macos-package CLICKY_DEBUG_PORT=8321 \
            "$app_dir/Buddy.app/Contents/MacOS/Buddy" --user-data-dir="$data_dir" \
            >"$RUNNER_TEMP/buddy-macos-package.log" 2>&1 &
          buddy_pid=$!
          trap 'kill "$buddy_pid" 2>/dev/null || true' EXIT
          state=''
          for _ in $(seq 1 40); do
            state=$(curl -fsS -H 'X-Debug-Token: buddy-macos-package' \
              http://127.0.0.1:8321/hover/state 2>/dev/null) && break
            sleep 0.5
          done
          test -n "$state" || { cat "$RUNNER_TEMP/buddy-macos-package.log"; exit 1; }
          STATE="$state" node -e "const s=JSON.parse(process.env.STATE); if (!s.windows?.length || s.windows.some(w => w.nativeFullDisplay !== true || !['notch','floating'].includes(w.surface?.kind))) { console.error(JSON.stringify(s)); process.exit(1) }"
          kill "$buddy_pid"
          wait "$buddy_pid" 2>/dev/null || true
          trap - EXIT
      - uses: actions/upload-artifact@v7
        with:
          name: buddy-macos-adhoc
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error
